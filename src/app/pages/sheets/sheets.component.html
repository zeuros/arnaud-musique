<div class="sheets-page">
  <div class="sheets-header">
    <h1>Partitions</h1>
    <p>Cliquez sur une partition pour la visualiser</p>

    <p-iconfield>
      <p-inputicon styleClass="pi pi-search"/>
      <input
        pInputText
        type="text"
        placeholder="Rechercher une partition..."
        [value]="search()"
        (input)="onSearch($any($event.target).value)"
      />
    </p-iconfield>
  </div>

  <div class="sheets-layout">
    <aside class="sheets-list">
      @if (filtered().length === 0) {
        <div class="empty">Aucune partition trouvée</div>
      }
      @for (sheet of filtered(); track sheet.id) {
        <button
          class="sheet-item"
          [class.active]="selected()?.id === sheet.id"
          (click)="select(sheet)"
        >
          <span class="sheet-icon">♬</span>
          <div class="sheet-info">
            <strong>{{ sheet.nom }}</strong>
            <span>{{ sheet.description }}</span>
            <time>{{ sheet.date }}</time>
          </div>
        </button>
      }
    </aside>

    <main class="pdf-viewer">
      @if (pdfUrl(); as url) {
        <iframe
          [src]="url"
          title="Visualiseur PDF"
          width="100%"
          height="100%"
          style="border:none"
        ></iframe>
      } @else {
        <div class="pdf-placeholder">
          <span>♩</span>
          <p>Sélectionnez une partition pour la visualiser</p>
        </div>
      }
    </main>
  </div>
</div>
